<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>王大师的三枚铜钱</title>
    <!-- PWA 支持 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 农历/八字计算库 -->
    <script src="https://unpkg.com/lunar-javascript@1.6.13/lunar.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { background: #f5f0e7; font-family: 'Segoe UI', 'Noto Sans CJK SC', Roboto, 'Helvetica Neue', sans-serif; padding: 20px; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; background: #fffaf2; border-radius: 48px; box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.05); padding: 24px 20px 32px; position: relative; }
        .title-section { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; margin: 0; color: #3e2a1f; font-weight: 500; letter-spacing: 2px; }
        .prob-badge { background: #2c3e2b; color: #f7e9ce; font-size: 0.7rem; padding: 4px 12px; border-radius: 40px; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .sub { text-align: center; color: #8b7355; font-size: 0.85rem; border-bottom: 1px solid #ede3d4; padding-bottom: 16px; margin-bottom: 20px; }
        .coin-area { background: #e8dfd1; border-radius: 80px; padding: 24px 16px; text-align: center; margin-bottom: 24px; box-shadow: inset 0 1px 4px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.05); }
        .coin-display { font-size: 2.2rem; letter-spacing: 20px; font-weight: 500; background: #fef3e4; display: inline-block; padding: 16px 28px; border-radius: 80px; box-shadow: 0 6px 0 #b59d7a; color: #c27e3a; font-family: monospace; }
        .btn-shake { background: #9b7b5c; border: none; font-size: 1.4rem; font-weight: bold; padding: 12px 24px; border-radius: 60px; color: white; margin-top: 18px; width: 70%; cursor: pointer; transition: 0.1s; box-shadow: 0 3px 0 #5e3e28; font-family: inherit; }
        .btn-shake:active { transform: translateY(2px); box-shadow: 0 1px 0 #5e3e28; }
        .btn-shake:disabled { opacity: 0.5; transform: none; box-shadow: 0 3px 0 #5e3e28; cursor: not-allowed; }
        .records { background: #fdf8f0; border-radius: 32px; padding: 12px 16px; margin: 20px 0; border: 1px solid #ede0cf; }
        .yao-list { display: flex; flex-direction: column-reverse; gap: 8px; margin: 12px 0; }
        .yao-item { background: white; border-radius: 60px; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid #c28a4e; box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-size: 1rem; }
        .yao-position { font-weight: bold; width: 55px; color: #5a3e28; }
        .yao-symbol { font-size: 1.8rem; line-height: 1; letter-spacing: 6px; font-family: 'Segoe UI', 'Noto Sans CJK SC', monospace; }
        .yao-type { font-size: 0.8rem; background: #efe2d0; padding: 4px 12px; border-radius: 40px; color: #4a3624; }

        /* 生辰八字面板 */
        .bazi-section { margin-bottom: 16px; }
        .bazi-toggle { background: #e8dfd1; border-radius: 40px; padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-weight: 500; color: #4a3624; border: 1px solid #d6c4ae; }
        .bazi-panel { background: #f8f1e7; border-radius: 24px; padding: 16px; margin-top: 12px; border: 1px solid #d6c4ae; /* 默认显示，移除 display: none */ }
        .bazi-panel.hidden { display: none; } /* 点击 toggle 后添加 .hidden 来隐藏 */
        .picker-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .picker-row label { width: 60px; font-weight: bold; color: #5a3e28; align-self: center; }
        .picker-row select { flex: 1; padding: 10px; border-radius: 30px; border: 1px solid #cbb295; background: white; font-size: 1rem; font-family: inherit; }
        .bazi-display { background: #2c3e2b; color: #f7e9ce; padding: 10px 16px; border-radius: 40px; text-align: center; font-size: 1.1rem; letter-spacing: 2px; margin-top: 12px; }
        .btn-bazi-apply { background: #9b7b5c; color: white; border: none; border-radius: 40px; padding: 10px 20px; font-size: 1rem; width: 100%; margin-top: 8px; cursor: pointer; font-weight: bold; }

        .result-card { background: #f1e9de; border-radius: 28px; padding: 20px 16px; margin-top: 16px; border-top: 3px solid #dbbd96; }
        .gua-name { font-size: 2.6rem; font-weight: bold; text-align: center; margin: 8px 0 16px; color: #2b4f3a; letter-spacing: 4px; }
        .info-line { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 18px; border-radius: 40px; margin: 8px 0; font-size: 1rem; }
        button.reset { background: #cdb59b; border: none; padding: 12px 20px; border-radius: 40px; font-size: 1.1rem; width: 100%; margin-top: 20px; font-weight: bold; cursor: pointer; transition: 0.1s; color: #2d241a; }
        footer { font-size: 0.7rem; text-align: center; color: #b49b7c; margin-top: 20px; }
        .badge { background: #3e2a1f; color: #f9e5c1; border-radius: 40px; padding: 4px 12px; font-size: 0.7rem; display: inline-block; }
        .coin-hint { font-size: 0.8rem; margin-top: 12px; color: #7e623f; }
    </style>
</head>
<body>
<div class="container">
    <div class="title-section">
        <h1>🐮🍺王大师的三枚铜钱</h1>
        <div class="prob-badge">📊 老阴/老阳各12.5% · 少阴/少阳各37.5%</div>
    </div>
    <div class="sub">三枚铜钱 · 诚心掷卦 · 初爻在下</div>

    <div class="coin-area">
        <div class="coin-display" id="coinDisplay">阳 阳 阳</div>
        <button class="btn-shake" id="shakeBtn">掷 铜 钱</button>
        <div class="coin-hint">↑ 每次掷一爻，共需 <strong>6次</strong> 掷完，自动解卦</div>
    </div>

    <div class="records">
        <div style="display: flex; justify-content: space-between;">
            <span>📜 卦爻记录 <span style="font-size:0.7rem;">(初爻在下)</span></span>
            <span class="badge" id="stepCounter">第0 / 6爻</span>
        </div>
        <div id="yaoList" class="yao-list">
            <div style="text-align:center; color:#b89a74; padding:12px;">点击上方铜钱开始掷卦</div>
        </div>
    </div>

    <!-- 生辰八字模块（默认展开） -->
    <div class="bazi-section">
        <div class="bazi-toggle" id="baziToggle">
            <span>📅 设定生辰八字</span>
        </div>
        <div class="bazi-panel" id="baziPanel">
            <div class="picker-row">
                <label>年份</label>
                <select id="yearSelect"></select>
            </div>
            <div class="picker-row">
                <label>月份</label>
                <select id="monthSelect"></select>
            </div>
            <div class="picker-row">
                <label>日期</label>
                <select id="daySelect"></select>
            </div>
            <div class="picker-row">
                <label>时辰</label>
                <select id="hourSelect"></select>
            </div>
            <button class="btn-bazi-apply" id="applyBazi">应用此八字</button>
            <p style="font-size:0.7rem; color:#8b7355; text-align:center; margin:4px 0 8px;">👆 八字为选填，若不填则结果中不显示</p>
            <div class="bazi-display" id="baziDisplay">请选择出生时间</div>
        </div>
        
    </div>

    <div id="resultPanel" style="display: none;">
        <div class="result-card">
            <div style="font-size:0.85rem; text-align:center; letter-spacing:2px;">⚡ 占 卜 结 果 ⚡</div>
            <div class="gua-name" id="benGuaName">--</div>
            <div class="info-line"><span>📖 本卦</span><span id="benGuaDetail"></span></div>
            <div class="info-line"><span>🔄 变卦</span><span id="bianGuaDetail"></span></div>
            <div class="info-line"><span>⚡ 动爻</span><span id="dongYaoInfo"></span></div>
            <div id="baziInfoLine" class="info-line" style="background: #2c3e2b; color: #f7e9ce; display: none;"><span>🧧 生辰八字</span><span id="resultBazi"></span></div>
        </div>
        <div style="text-align:center; margin: 12px 0 4px;">
            <a id="baziDetailLink" href="bazi.html" style="display:inline-block; background:#9b7b5c; color:#fff; padding:10px 24px; border-radius:40px; text-decoration:none; font-weight:bold;" target="_blank">📜 查看八字详解</a>
            <button id="askAI" style="display:inline-block; background:#2c3e2b; color:#f7e9ce; padding:10px 24px; border-radius:40px; border:none; font-weight:bold; cursor:pointer; margin:8px;">🤖 让 DeepSeek 解卦</button>
        </div>
        <button class="reset" id="resetBtn">🔄 重新起卦 · 再卜一卦</button>
    </div>
    <div style="text-align:center; margin: 16px 0 8px;">
        <a href="wuxing.html" style="display:inline-block; background:#cdb59b; color:#fff; padding:10px 24px; border-radius:40px; text-decoration:none; font-weight:bold;" target="_blank">👗 五行穿衣指南</a>
    </div>
    <footer>三枚铜钱 · 一爻一掷 · 老阴(6)老阳(9)为动爻</footer>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 八字计算 ----------
        let currentBazi = { year: '', month: '', day: '', hour: '', full: '未设置' };
        
        function initDateSelects() {
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            const daySelect = document.getElementById('daySelect');
            const hourSelect = document.getElementById('hourSelect');
            
            const currentYear = new Date().getFullYear();
            for (let y = 1900; y <= currentYear + 1; y++) {
                const option = document.createElement('option');
                option.value = y;
                option.textContent = y + '年';
                if (y === 2000) option.selected = true;
                yearSelect.appendChild(option);
            }
            
            for (let m = 1; m <= 12; m++) {
                const option = document.createElement('option');
                option.value = m;
                option.textContent = m + '月';
                monthSelect.appendChild(option);
            }
            
            function updateDays() {
                const year = parseInt(yearSelect.value);
                const month = parseInt(monthSelect.value);
                const daysInMonth = new Date(year, month, 0).getDate();
                daySelect.innerHTML = '';
                for (let d = 1; d <= daysInMonth; d++) {
                    const option = document.createElement('option');
                    option.value = d;
                    option.textContent = d + '日';
                    daySelect.appendChild(option);
                }
            }
            
            yearSelect.addEventListener('change', updateDays);
            monthSelect.addEventListener('change', updateDays);
            updateDays();
            
            const hourNames = ['子时 (23-01)', '丑时 (01-03)', '寅时 (03-05)', '卯时 (05-07)', 
                               '辰时 (07-09)', '巳时 (09-11)', '午时 (11-13)', '未时 (13-15)', 
                               '申时 (15-17)', '酉时 (17-19)', '戌时 (19-21)', '亥时 (21-23)'];
            hourNames.forEach((name, idx) => {
                const option = document.createElement('option');
                option.value = idx;
                option.textContent = name;
                hourSelect.appendChild(option);
            });
            hourSelect.value = 6;
        }
        initDateSelects();

        function computeBazi() {
            const year = parseInt(document.getElementById('yearSelect').value);
            const month = parseInt(document.getElementById('monthSelect').value);
            const day = parseInt(document.getElementById('daySelect').value);
            const hourIndex = parseInt(document.getElementById('hourSelect').value);
            
            const date = new Date(year, month-1, day, (hourIndex * 2) % 24, 0, 0);
            const lunar = window.Lunar.fromDate(date);
            const eightChar = lunar.getEightChar();
            
            const full = `${eightChar.getYear()} ${eightChar.getMonth()} ${eightChar.getDay()} ${eightChar.getTime()}`;
            return {
                year: eightChar.getYear(),
                month: eightChar.getMonth(),
                day: eightChar.getDay(),
                hour: eightChar.getTime(),
                full: full
            };
        }

        function updateBaziDisplay() {
            try {
                const bazi = computeBazi();
                currentBazi = bazi;
                document.getElementById('baziDisplay').innerText = `八字：${bazi.full}`;
                if (step === 6) {
                    const baziLine = document.getElementById('baziInfoLine');
                    if (bazi.full !== '未设置') {
                    baziLine.style.display = 'flex';
                    document.getElementById('resultBazi').innerText = bazi.full;
                    } else {
                    baziLine.style.display = 'none';
                    }
                }
            } catch (e) {
                console.warn('八字计算异常', e);
                document.getElementById('baziDisplay').innerText = '八字计算失败，请重试';
            }
        }

        // 切换面板（使用 .hidden 类代替 .show）
        const toggleBtn = document.getElementById('baziToggle');
        const panel = document.getElementById('baziPanel');
        toggleBtn.addEventListener('click', () => {
            panel.classList.toggle('hidden');
        });

        document.getElementById('applyBazi').addEventListener('click', () => {
            updateBaziDisplay();
            
        });

        setTimeout(() => {
            updateBaziDisplay();
        }, 200);

        // ---------- 八卦基础 ----------
        const GUA_8_NAMES = ["坤", "艮", "坎", "巽", "震", "离", "兑", "乾"];
        
        function build64GuaNames() {
            const arr = [];
            for (let shang = 0; shang < 8; shang++) {
                for (let xia = 0; xia < 8; xia++) {
                    let fullName = "";
                    if (shang === xia) {
                        const pureMap = ["坤为地","艮为山","坎为水","巽为风","震为雷","离为火","兑为泽","乾为天"];
                        fullName = pureMap[shang];
                    } else {
                        const shangSymbol = ["地","山","水","风","雷","火","泽","天"][shang];
                        const xiaSymbol = ["地","山","水","风","雷","火","泽","天"][xia];
                        fullName = shangSymbol + xiaSymbol + getGuaSuffix(shang, xia);
                    }
                    arr.push(fullName);
                }
            }
            return arr;
        }

        function getGuaSuffix(shang, xia) {
            const map = {
                "0,1":"剥", "0,2":"比", "0,3":"观", "0,4":"豫", "0,5":"晋", "0,6":"萃", "0,7":"否",
                "1,0":"谦", "1,2":"蹇", "1,3":"渐", "1,4":"小过", "1,5":"旅", "1,6":"咸", "1,7":"遁",
                "2,0":"师", "2,1":"蒙", "2,3":"涣", "2,4":"解", "2,5":"未济", "2,6":"困", "2,7":"讼",
                "3,0":"升", "3,1":"蛊", "3,2":"井", "3,4":"恒", "3,5":"鼎", "3,6":"大过", "3,7":"姤",
                "4,0":"复", "4,1":"颐", "4,2":"屯", "4,3":"益", "4,5":"噬嗑", "4,6":"随", "4,7":"无妄",
                "5,0":"明夷", "5,1":"贲", "5,2":"既济", "5,3":"家人", "5,4":"丰", "5,6":"革", "5,7":"同人",
                "6,0":"临", "6,1":"损", "6,2":"节", "6,3":"中孚", "6,4":"归妹", "6,5":"睽", "6,7":"履",
                "7,0":"泰", "7,1":"大畜", "7,2":"需", "7,3":"小畜", "7,4":"大壮", "7,5":"大有", "7,6":"夬"
            };
            return map[shang+","+xia] || "";
        }

        const GUA_64_NAMES = build64GuaNames();
        function getGuaName(shang, xia) {
            return GUA_64_NAMES[shang * 8 + xia] || "未知卦";
        }

        function throwCoins() {
            const c1 = Math.random() < 0.5 ? 0 : 1;
            const c2 = Math.random() < 0.5 ? 0 : 1;
            const c3 = Math.random() < 0.5 ? 0 : 1;
            const yangCount = c1 + c2 + c3;
            let yaoValue;
            if (yangCount === 0) yaoValue = 6;
            else if (yangCount === 1) yaoValue = 7;
            else if (yangCount === 2) yaoValue = 8;
            else yaoValue = 9;
            const char1 = c1 === 1 ? "阳" : "阴";
            const char2 = c2 === 1 ? "阳" : "阴";
            const char3 = c3 === 1 ? "阳" : "阴";
            return { yaoValue, coinStr: `${char1}  ${char2}  ${char3}` };
        }

        function yaoSymbol(val) {
            if (val === 6) return "🌛";
            if (val === 9) return "🌞";
            if (val === 7) return "🌞";
            return "🌛";
        }

        function yaoTypeName(val) {
            if (val === 6) return "老阴 ⚋";
            if (val === 9) return "老阳 ⚊";
            if (val === 7) return "少阳 ⚊";
            return "少阴 ⚋";
        }

        function analyzeYao(yaoValues) {
            const benBinary = [], bianBinary = [], dongList = [];
            for (let i=0; i<6; i++) {
                const val = yaoValues[i];
                const benBit = (val===7||val===9)?1:0;
                let bianBit = benBit;
                if (val===6) { bianBit=1; dongList.push(i+1); }
                else if (val===9) { bianBit=0; dongList.push(i+1); }
                benBinary.push(benBit);
                bianBinary.push(bianBit);
            }
            const xiaBen = benBinary[0]*4 + benBinary[1]*2 + benBinary[2]*1;
            const shangBen = benBinary[3]*4 + benBinary[4]*2 + benBinary[5]*1;
            const benGua = getGuaName(shangBen, xiaBen);
            const xiaBian = bianBinary[0]*4 + bianBinary[1]*2 + bianBinary[2]*1;
            const shangBian = bianBinary[3]*4 + bianBinary[4]*2 + bianBinary[5]*1;
            const bianGua = getGuaName(shangBian, xiaBian);
            const dongText = dongList.length ? dongList.join("、") + "爻动" : "静卦";
            return { benGua, bianGua, dongText };
        }

        let currentYaos = [], step = 0;
        const coinDisplay = document.getElementById('coinDisplay');
        const shakeBtn = document.getElementById('shakeBtn');
        const yaoListDiv = document.getElementById('yaoList');
        const stepCounterSpan = document.getElementById('stepCounter');
        const resultPanel = document.getElementById('resultPanel');
        const resetBtn = document.getElementById('resetBtn');
        const benGuaNameEl = document.getElementById('benGuaName');
        const benGuaDetailEl = document.getElementById('benGuaDetail');
        const bianGuaDetailEl = document.getElementById('bianGuaDetail');
        const dongYaoInfoEl = document.getElementById('dongYaoInfo');
        const resultBaziEl = document.getElementById('resultBazi');

        function updateUI() {
            stepCounterSpan.innerText = `第${step} / 6爻`;
            if (step === 0) {
                yaoListDiv.innerHTML = `<div style="text-align:center; color:#b89a74; padding:12px;">🎲 掷第一爻 · 初爻</div>`;
            } else {
                let html = '';
                for (let i=0; i<currentYaos.length; i++) {
                    const val = currentYaos[i];
                    const posName = ["初爻","二爻","三爻","四爻","五爻","上爻"][i];
                    html += `<div class="yao-item"><span class="yao-position">${posName}</span><span class="yao-symbol">${yaoSymbol(val)}</span><span class="yao-type">${yaoTypeName(val)}</span></div>`;
                }
                yaoListDiv.innerHTML = html;
            }
            if (step === 6) {
                const analysis = analyzeYao(currentYaos);
                benGuaNameEl.innerText = analysis.benGua;
                benGuaDetailEl.innerText = analysis.benGua;
                bianGuaDetailEl.innerText = analysis.bianGua;
                dongYaoInfoEl.innerText = analysis.dongText;
                const baziLine = document.getElementById('baziInfoLine');
                if (currentBazi.full !== '未设置') {
                baziLine.style.display = 'flex';
                resultBaziEl.innerText = currentBazi.full;
                } else {
                baziLine.style.display = 'none';
                }
                resultPanel.style.display = 'block';
                shakeBtn.disabled = true;
                const year = document.getElementById('yearSelect').value;
                const month = document.getElementById('monthSelect').value;
                const day = document.getElementById('daySelect').value;
                const hour = document.getElementById('hourSelect').value;
                const link = document.getElementById('baziDetailLink');
                if (link) {
                    link.href = `bazi.html?y=${year}&m=${month}&d=${day}&h=${hour}`;
                }
                const askBtn = document.getElementById('askAI');
                if (askBtn) {
                    const guaInfo = `${analysis.benGua}，动爻${analysis.dongText}。请帮我解读这个卦象的含义、吉凶和注意事项。`;
                    askBtn.onclick = () => {
                        window.open(`https://chat.deepseek.com/?q=${encodeURIComponent(guaInfo)}`, '_blank', 'noopener,noreferrer');
                    };
                }
            } else {
                resultPanel.style.display = 'none';
                shakeBtn.disabled = false;
            }
        }

        function throwOnce() {
            if (step >= 6) return;
            const { yaoValue, coinStr } = throwCoins();
            currentYaos.push(yaoValue);
            step++;
            coinDisplay.innerText = coinStr;
            coinDisplay.style.transition = '0.08s';
            coinDisplay.style.backgroundColor = '#f5e2c1';
            setTimeout(() => coinDisplay.style.backgroundColor = '#fef3e4', 120);
            updateUI();
        }

        function resetAll() {
            currentYaos = [];
            step = 0;
            coinDisplay.innerText = "阳 阳 阳";
            coinDisplay.style.backgroundColor = '#fef3e4';
            updateUI();
            shakeBtn.disabled = false;
        }

        shakeBtn.addEventListener('click', throwOnce);
        resetBtn.addEventListener('click', resetAll);
        resetAll();
    })();
</script>

<!-- Service Worker 注册 -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/wjc-app/sw.js')
                .then(reg => console.log('SW 注册成功', reg.scope))
                .catch(err => console.log('SW 注册失败', err));
        });
    }
</script>
</body>
</html>
